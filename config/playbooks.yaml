thresholds:
  correctness_low: 0.7
  faithfulness_low: 0.75
  context_relevance_low: 0.65
  latency_high_ms: 5000

heuristics:
  - id: retrieval_quality_issue
    when:
      context_relevance_lt: 0.65
      retrieval_count_lte: 1
    action:
      - "reranker cutoff 점검"
      - "metadata filter 완화"
      - "embedding 모델 품질 확인"

  - id: answer_grounding_issue
    when:
      faithfulness_lt: 0.75
    action:
      - "답변 생성 프롬프트에 출처 인용 규칙 추가"
      - "grounding check step 도입 검토"

  - id: over_compression
    when:
      correctness_lt: 0.7
    action:
      - "답변 최소 길이 기준 도입"
      - "핵심 정보 포함 여부 체크리스트 추가"
